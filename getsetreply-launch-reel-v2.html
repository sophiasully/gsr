<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GetSetReply · Launch Reel</title>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/fonts/fonts.css">
<style>
:root{
  --dark:#061614;
  --cream:#f4faf6;
  --green:#22a06b;
  --green-bright:#4fc08d;
  --muted:#6f8a7e;
  --ease:cubic-bezier(.2,.7,.2,1);
  --ease-out:cubic-bezier(.16,1,.3,1);
}
*{ margin:0; padding:0; box-sizing:border-box; }
html,body{ background:#111; height:100%; display:flex; align-items:center; justify-content:center; font-family:'General Sans',system-ui,sans-serif; }

.stage{
  position:relative;
  width:405px; height:720px;
  background:var(--dark);
  overflow:hidden;
  border-radius:6px;
  -webkit-font-smoothing:antialiased;
}
.stage::before{
  content:""; position:absolute; pointer-events:none;
  width:560px; height:560px; left:-160px; top:-180px;
  background:radial-gradient(circle, rgba(79,192,141,.18) 0%, rgba(79,192,141,0) 62%);
}
.stage::after{
  content:""; position:absolute; pointer-events:none;
  width:520px; height:520px; right:-180px; bottom:-160px;
  background:radial-gradient(circle, rgba(79,192,141,.13) 0%, rgba(79,192,141,0) 62%);
}

.scene{ position:absolute; inset:0; opacity:0; visibility:hidden; }
.scene.on{ opacity:1; visibility:visible; }

/* ---------- Scene 1: Hello, GetSetReply. ---------- */
#s1{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:0 30px; text-align:center; }
#s1 .hello, #s1 .brandname{
  font-family:'General Sans',system-ui,sans-serif; font-weight:700; font-size:52px;
  letter-spacing:-.025em; line-height:1.05; color:var(--cream);
  opacity:0;
}
#s1 .brandname .set{ color:var(--green-bright); }

/* ---------- Scene 2: word stack ---------- */
#s2{ display:flex; flex-direction:column; align-items:center; justify-content:center; }
#s2 .stack{ display:flex; flex-direction:column; align-items:center; gap:8px; }
#s2 .kick{
  font-family:'General Sans',system-ui,sans-serif; font-weight:700; font-size:64px;
  letter-spacing:-.03em; line-height:1.02; color:var(--green);
  margin-bottom:20px; opacity:0; transform:translateY(22px);
}
#s2 .word{
  font-family:'General Sans',system-ui,sans-serif; font-weight:700; font-size:62px;
  letter-spacing:-.03em; line-height:1.02; color:var(--cream);
  opacity:0; transform:translateY(22px);
}
#s2 .word.auto{ color:var(--green-bright); }

/* ---------- Scene 3: logo + airplane finale ---------- */
#s3{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:30px; }
#s3 .url{
  font-family:'Space Mono',monospace; font-weight:700; font-size:14px;
  letter-spacing:.24em; text-transform:uppercase; color:var(--cream);
  opacity:0;
}
#s3 .url .dim{ color:var(--muted); }


.scene#s1.on .hello{ animation:fadeUp .8s var(--ease-out) .35s forwards; }
.scene#s1.on .brandname{ animation:fadeUp .8s var(--ease-out) .95s forwards; }

.scene#s2.on .kick{ animation:fadeUp .8s var(--ease-out) .2s forwards; }
.scene#s2.on .word:nth-of-type(1){ animation:fadeUp .8s var(--ease-out) 1.1s forwards; }
.scene#s2.on .word:nth-of-type(2){ animation:fadeUp .8s var(--ease-out) 2.0s forwards; }
.scene#s2.on .word:nth-of-type(3){ animation:fadeUp .8s var(--ease-out) 2.9s forwards; }
.scene#s2.on .word:nth-of-type(4){ animation:fadeUp .9s var(--ease-out) 3.8s forwards; }

.scene#s3.on .url{ animation:fadeUp 0.8s var(--ease-out) 0.3s forwards; }

@keyframes wrapIn{ from{ opacity:0; transform:scale(.7); } to{ opacity:1; transform:scale(1); } }
@keyframes spin360{ from{ transform:rotate(0deg); } to{ transform:rotate(360deg); } }
@keyframes fadeUp{ to{ opacity:1; transform:translateY(0); } }
@keyframes popIn{ to{ opacity:1; transform:scale(1); } }

.replay{
  position:absolute; bottom:14px; right:14px; z-index:50;
  font-family:'Space Mono',monospace; font-weight:700; font-size:10px;
  letter-spacing:.14em; text-transform:uppercase; color:var(--dark);
  background:var(--green-bright); border:none; border-radius:20px;
  padding:8px 16px; cursor:pointer; opacity:.85; transition:opacity .2s;
}
.replay:hover{ opacity:1; }
</style>
</head>
<body>
<div class="stage" id="stage">

  <div class="scene" id="s1">
    <span class="hello">Hello,</span>
    <span class="brandname">Get<span class="set">Set</span>Reply.</span>
  </div>

  <div class="scene" id="s2">
    <span class="kick">Reviews</span>
    <div class="stack">
      <span class="word">Requested.</span>
      <span class="word">Answered.</span>
      <span class="word">Handled.</span>
      <span class="word auto">Automatically.</span>
    </div>
  </div>

  <div class="scene" id="s3">
    <div class="url">getsetreply<span class="dim">.com</span></div>
  </div>

  <button class="replay" id="replay">&#8635; Replay</button>
</div>

<script>
const scenes = [
  { el: document.getElementById('s1'), dur: 2600 },
  { el: document.getElementById('s2'), dur: 5100 },
  { el: document.getElementById('s3'), dur: 4200 },
];
let timers = [];
function clearTimers(){ timers.forEach(t=>clearTimeout(t)); timers = []; }
function play(){
  window.__REEL__.playStartedAt = performance.now();
  clearTimers();
  scenes.forEach(s=> s.el.classList.remove('on'));
  let t = 0;
  scenes.forEach((s)=>{
    timers.push(setTimeout(()=>{
      scenes.forEach(x=> x.el.classList.remove('on'));
      s.el.classList.add('on');
    }, t));
    t += s.dur;
  });
}
document.getElementById('replay').addEventListener('click', play);
window.addEventListener('load', ()=> setTimeout(play, 300));

// Render-pipeline convention (see tools/render): durationMs is how long
// playback runs once started. playStartedAt is set by play() itself (in
// performance.now() terms) so the renderer can tell how far into the
// timeline autoplay already got while network/fonts were settling, and
// capture only the remaining duration instead of assuming frame 0 is t=0.
window.__REEL__ = {
  durationMs: 300 + scenes.reduce((t, s) => t + s.dur, 0),
  startDelayMs: 300,
  playStartedAt: null,
};
</script>
</body>
</html>
