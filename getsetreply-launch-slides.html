<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GetSetReply · Launch Slides</title>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/fonts/fonts.css">
<style>
:root{
  --dark:#061614;
  --cream:#f4faf6;
  --green:#22a06b;
  --green-bright:#4fc08d;
  --muted:#6f8a7e;
}
*{ margin:0; padding:0; box-sizing:border-box; }
html,body{ background:#111; font-family:'General Sans',system-ui,sans-serif; }

/* Gallery is just for browser preview - tools/render/slides.mjs screenshots
   each .stage individually, so this layout never appears in the exported
   PNGs. */
.gallery{
  display:flex; flex-wrap:wrap; gap:24px; padding:24px;
}

.stage{
  position:relative;
  width:405px; height:720px;
  background:var(--dark);
  overflow:hidden;
  border-radius:6px;
  -webkit-font-smoothing:antialiased;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.stage::before{
  content:""; position:absolute; pointer-events:none;
  width:560px; height:560px; left:-160px; top:-180px;
  background:radial-gradient(circle, rgba(79,192,141,.18) 0%, rgba(79,192,141,0) 62%);
}
.stage::after{
  content:""; position:absolute; pointer-events:none;
  width:520px; height:520px; right:-180px; bottom:-160px;
  background:radial-gradient(circle, rgba(79,192,141,.13) 0%, rgba(79,192,141,0) 62%);
}

/* ---------- Slide 1: Hello, GetSetReply. ---------- */
#slide-1{ gap:14px; padding:0 30px; text-align:center; }
#slide-1 .hello, #slide-1 .brandname{
  font-family:'General Sans',system-ui,sans-serif; font-weight:700; font-size:52px;
  letter-spacing:-.025em; line-height:1.05; color:var(--cream);
}
#slide-1 .brandname .set{ color:var(--green-bright); }

/* ---------- Slide 2: stat grid ---------- */
#slide-2, #slide-2b{ padding:0 28px; }
.kick{
  font-family:'General Sans',system-ui,sans-serif; font-weight:700; font-size:44px;
  letter-spacing:-.03em; line-height:1.02; color:var(--green);
  margin-bottom:28px;
}
.tagline{
  font-family:'General Sans',system-ui,sans-serif; font-weight:700; font-size:30px;
  letter-spacing:-.02em; line-height:1.05; color:var(--cream); text-align:center;
  margin-top:32px;
}
.tagline .accent{ color:var(--green-bright); }

.stats-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; width:100%; }
.stat{
  background:rgba(79,192,141,.08); border:1px solid rgba(79,192,141,.22);
  border-radius:16px; padding:26px 12px; text-align:center;
}
.stat-value{
  font-family:'General Sans',system-ui,sans-serif; font-weight:700; font-size:40px;
  letter-spacing:-.02em; line-height:1; color:var(--cream);
}
.stat-value .unit{ font-size:.6em; margin-left:2px; }
.stat-value.accent{ color:var(--green-bright); }
.stat-label{
  margin-top:10px; font-family:'Space Mono',monospace; font-size:11px;
  letter-spacing:.08em; text-transform:uppercase; color:var(--muted);
}

/* ---------- Slide 2b: hero stat + supporting row ---------- */
.hero-stat{ text-align:center; }
.hero-value{
  font-family:'General Sans',system-ui,sans-serif; font-weight:700; font-size:104px;
  letter-spacing:-.03em; line-height:1; color:var(--green-bright);
}
.hero-label{
  margin-top:10px; font-family:'Space Mono',monospace; font-size:13px;
  letter-spacing:.12em; text-transform:uppercase; color:var(--muted);
}
.mini-row{ display:flex; gap:10px; width:100%; margin-top:40px; }
.mini{ flex:1; text-align:center; }
.mini-value{
  font-family:'General Sans',system-ui,sans-serif; font-weight:700; font-size:28px;
  letter-spacing:-.02em; color:var(--cream);
}
.mini-label{
  margin-top:8px; font-family:'Space Mono',monospace; font-size:9px;
  letter-spacing:.06em; text-transform:uppercase; color:var(--muted);
}

/* ---------- Slide 3: logo + airplane finale ---------- */
#slide-3{ gap:30px; }
#slide-3 .logo{ display:flex; align-items:center; gap:14px; }
#slide-3 .logo .plane{ width:34px; height:34px; color:var(--green-bright); }
#slide-3 .logo .wordmark{
  font-family:'General Sans',system-ui,sans-serif; font-weight:700; font-size:36px;
  letter-spacing:-.02em; color:var(--cream);
}
#slide-3 .logo .wordmark .set{ color:var(--green-bright); }
#slide-3 .url{
  font-family:'Space Mono',monospace; font-weight:700; font-size:14px;
  letter-spacing:.24em; text-transform:uppercase; color:var(--cream);
}
#slide-3 .url .dim{ color:var(--muted); }
</style>
</head>
<body>
<div class="gallery">

  <div class="stage" id="slide-1" data-slide="1">
    <span class="hello">Hello,</span>
    <span class="brandname">Get<span class="set">Set</span>Reply.</span>
  </div>

  <!-- Placeholder numbers below - swap in GetSetReply's real stats before shipping. -->
  <div class="stage" id="slide-2" data-slide="2">
    <span class="kick">Reviews</span>
    <div class="stats-grid">
      <div class="stat">
        <div class="stat-value">4.9<span class="unit">★</span></div>
        <div class="stat-label">Average rating</div>
      </div>
      <div class="stat">
        <div class="stat-value accent">12.4K</div>
        <div class="stat-label">Reviews answered</div>
      </div>
      <div class="stat">
        <div class="stat-value accent">98%</div>
        <div class="stat-label">Response rate</div>
      </div>
      <div class="stat">
        <div class="stat-value">&lt;2h</div>
        <div class="stat-label">Avg. reply time</div>
      </div>
    </div>
    <div class="tagline">Handled <span class="accent">automatically.</span></div>
  </div>

  <!-- Placeholder numbers below - swap in GetSetReply's real stats before shipping. -->
  <div class="stage" id="slide-2b" data-slide="2b">
    <span class="kick">Reviews</span>
    <div class="hero-stat">
      <div class="hero-value">98%</div>
      <div class="hero-label">Response rate</div>
    </div>
    <div class="mini-row">
      <div class="mini">
        <div class="mini-value">4.9★</div>
        <div class="mini-label">Avg rating</div>
      </div>
      <div class="mini">
        <div class="mini-value">12.4K</div>
        <div class="mini-label">Answered</div>
      </div>
      <div class="mini">
        <div class="mini-value">&lt;2h</div>
        <div class="mini-label">Reply time</div>
      </div>
    </div>
    <div class="tagline">Handled <span class="accent">automatically.</span></div>
  </div>

  <div class="stage" id="slide-3" data-slide="3">
    <div class="logo">
      <svg class="plane" viewBox="0 0 24 24" fill="currentColor"><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
      <span class="wordmark">Get<span class="set">Set</span>Reply</span>
    </div>
    <div class="url">getsetreply<span class="dim">.com</span></div>
  </div>

</div>
</body>
</html>
